<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Note Search</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div>
          <h1>Note Search</h1>
          <p class="muted">Google 登录后，按当前账号绑定的 namespace 检索 `text-docs`。</p>
        </div>
        <div id="auth-area" class="auth-area"></div>
      </header>

      <section class="search-panel">
        <div class="view-switch">
          <button type="button" id="search-view-btn" class="secondary-btn">搜索结果</button>
          <button type="button" id="recent-view-btn" class="secondary-btn">最近笔记</button>
        </div>

        <form id="create-form" class="create-form">
          <div class="create-form-header">
            <h2>新建笔记</h2>
            <p class="muted">写入当前账号绑定的 namespace，写完后可立即搜索和查看详情。</p>
          </div>
          <input id="title-input" name="title" type="text" placeholder="标题" autocomplete="off" />
          <textarea id="body-input" name="body" placeholder="正文"></textarea>
          <div class="create-actions">
            <button type="submit">保存笔记</button>
          </div>
        </form>

        <form id="auto-create-form" class="create-form auto-create-form">
          <div class="create-form-header">
            <h2>半自动笔记</h2>
            <p class="muted">只填正文，系统自动生成标题和标签后保存到当前 namespace。</p>
          </div>
          <textarea id="auto-body-input" name="body" placeholder="正文"></textarea>
          <div class="create-actions">
            <button type="submit">生成并保存</button>
          </div>
        </form>

        <form id="search-form">
          <input id="query-input" name="query" type="text" placeholder="输入关键词，例如：西班牙语动词变位" autocomplete="off" />
          <button type="submit">搜索</button>
        </form>
        <div class="search-controls">
          <label>
            每页
            <select id="limit-select">
              <option value="8" selected>8</option>
              <option value="12">12</option>
              <option value="16">16</option>
            </select>
          </label>
          <label>
            内容
            <select id="body-mode-select">
              <option value="all" selected>全部</option>
              <option value="inline">短文</option>
              <option value="nbss">长文</option>
            </select>
          </label>
          <label>
            最低分
            <input id="min-score-input" type="number" min="0" max="1" step="0.05" value="0.15" />
          </label>
        </div>
        <div id="status" class="status"></div>
        <div id="active-filters" class="active-filters hidden"></div>
      </section>

      <section id="detail" class="detail hidden"></section>
      <section id="results" class="results"></section>
      <section id="pagination" class="pagination hidden"></section>
    </main>
    <script src="/app.js" defer></script>
  </body>
  </html>
